# sup computer — uv workspace root (virtual; not itself a package).
#
#   uv sync         # create .venv and editable-install core + projects
#   uv run python core/nanogpt_core/train.py ...
#
# core/ is editable-installed, so editing the engine and every consumer happens
# in one place. Weights and corpora never live in the tree (see .gitignore).

[tool.uv.workspace]
members = ["core", "projects/*"]
# Every project is a workspace member with its own pyproject.toml declaring
# what it actually imports (gatsby: tokenizers; daydream: python-chess; ...).
# None are build targets — they're thin consumers that run scripts in the
# workspace venv against the editable-installed core.

[tool.uv.sources]
supcomputer-core = { workspace = true }

[tool.ruff]
# Lint the living code only. Vendored projects and frozen models/<version>/
# snapshots keep their upstream nanoGPT style and are never linted.
include = ["core/**/*.py", "tools/**/*.py"]
extend-exclude = ["projects", "website", "player"]
line-length = 120

[tool.ruff.lint]
# defaults (E4/E7/E9/F); the exec()-driven configurator pattern means
# train.py/sample.py legitimately reference "undefined" names at lint time.
per-file-ignores = { "core/nanogpt_core/train.py" = ["F821"], "core/nanogpt_core/sample.py" = ["F821"] }
