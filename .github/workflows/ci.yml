name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  train-small-model:
    name: train small model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # check_integrity verifies registry git tags
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true # torch wheels are the slow part; cache keyed on uv.lock
      - name: Lint (ruff)
        run: uvx ruff check .
      - name: Repo integrity (registry, links, weights)
        run: python3 tools/check_integrity.py
      - name: Install workspace
        run: uv sync --group dev --extra export
      - name: Train a small model
        run: uv run --group dev pytest core/tests/ -q

  build-the-site:
    name: build the site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Build the site (runs sync-content via prebuild)
        working-directory: website
        run: |
          npm ci
          npm run build
