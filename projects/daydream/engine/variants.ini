# Daydream custom Fairy-Stockfish variant: Grand (12 files x 10 ranks).
#
# Extends the built-in `grand` variant (real Grand Chess, 10x10, verified
# via `setoption name UCI_Variant value grand` + `d`: base has ONE
# Chancellor + ONE Archbishop per side, not two -- corrects an earlier
# web-search-derived assumption). Grand12 widens to 12 files and adds a
# second Chancellor + second Archbishop pair, mirrored symmetrically
# around center, to keep non-pawn piece density proportional to the wider
# board (10 non-pawn pieces / 10 files in base -> 12 / 12 here).
#
# Board is 12 files x 10 ranks, not 12x12 square: this installed
# Fairy-Stockfish build's `Rank` option type caps at 10 even though `File`
# goes to 12 (confirmed via `check`) -- a real engine constraint discovered
# during build, not a design choice. Rank count otherwise matches the base
# `grand` variant exactly (same 4-rank empty buffer, same 3-rank pawn/piece
# depth per side), so only the file dimension and piece composition change.
#
# Micro (5x5) needs no custom entry -- Fairy-Stockfish ships `gardner`
# built in, confirmed identical to the locked spec (R N B Q K back rank).
[grand12:grand]
maxRank = 10
maxFile = 12
startFen = r10r/1nbcaqkacbn1/pppppppppppp/12/12/12/12/PPPPPPPPPPPP/1NBCAQKACBN1/R10R w - - 0 1
